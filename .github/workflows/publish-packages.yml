name: Publish packages

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: Package version, for example 0.1.0-preview.1
        required: true
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: packages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - name: Download verified SVN client
        shell: pwsh
        run: |
          $archive = Join-Path $env:RUNNER_TEMP 'Slik-Subversion-1.14.5-x64.zip'
          $expanded = Join-Path $env:RUNNER_TEMP 'Slik-Subversion'
          $install = Join-Path $env:RUNNER_TEMP 'SlikSvn'
          curl.exe --fail --location --retry 5 --retry-all-errors --retry-delay 5 --output $archive 'https://sliksvn.com/pub/Slik-Subversion-1.14.5-x64.zip'
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          $expectedHash = '77D4FE02999DDA3BDC3A20E86243AE6EDE99AAF072B4C12B0CDEDB54D88E954A'
          $actualHash = (Get-FileHash $archive -Algorithm SHA256).Hash
          if ($actualHash -ne $expectedHash) {
            throw "SVN archive checksum mismatch: expected $expectedHash, actual $actualHash."
          }

          Expand-Archive $archive -DestinationPath $expanded
          $msi = Get-ChildItem $expanded -Recurse -Filter '*.msi' | Select-Object -First 1
          if ($null -eq $msi) { throw 'The SVN archive does not contain an MSI installer.' }
          $arguments = @('/i', $msi.FullName, '/qn', '/norestart', 'INSTALLLEVEL=300', "INSTALLLOCATION=$install")
          $process = Start-Process msiexec.exe -ArgumentList $arguments -Wait -PassThru
          if ($process.ExitCode -notin @(0, 1641, 3010)) { exit $process.ExitCode }

          $svnBin = Join-Path $install 'bin'
          $svnBin >> $env:GITHUB_PATH
          & (Join-Path $svnBin 'svn.exe') --version --quiet

      - name: Select package version
        id: version
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $version = '${{ inputs.version }}'
          } else {
            $version = '${{ github.ref_name }}'.TrimStart('v')
          }
          if ($version -notmatch '^\d+\.\d+\.\d+([-.][0-9A-Za-z.-]+)?$') {
            throw "Invalid package version '$version'."
          }
          "value=$version" >> $env:GITHUB_OUTPUT
      - name: Restore
        run: dotnet restore SvnFlux.slnx
      - name: Test
        run: dotnet test SvnFlux.slnx -c Release --no-restore
      - name: Pack libraries
        shell: pwsh
        run: |
          $projects = @(
            'SvnFlux.Core/src/SvnFlux.Core/SvnFlux.Core.csproj',
            'SvnFlux.Svndiff/src/SvnFlux.Svndiff/SvnFlux.Svndiff.csproj',
            'SvnFlux.RaSvn/src/SvnFlux.RaSvn/SvnFlux.RaSvn.csproj',
            'SvnFlux.Repository.FileSystem/src/SvnFlux.Repository.FileSystem/SvnFlux.Repository.FileSystem.csproj',
            'SvnFlux.Repository.Memory/src/SvnFlux.Repository.Memory/SvnFlux.Repository.Memory.csproj',
            'SvnFlux.Http/src/SvnFlux.Http/SvnFlux.Http.csproj'
          )
          foreach ($project in $projects) {
            dotnet pack $project -c Release --no-restore --no-build `
              -p:PackageVersion=${{ steps.version.outputs.value }} `
              --output artifacts/packages
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }
      - name: Publish to GitHub Packages
        shell: pwsh
        run: |
          Get-ChildItem artifacts/packages/*.nupkg | ForEach-Object {
            dotnet nuget push $_.FullName `
              --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" `
              --api-key "${{ secrets.GITHUB_TOKEN }}" `
              --skip-duplicate
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }
